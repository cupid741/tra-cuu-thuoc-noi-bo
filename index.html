<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRA CỨU GIÁ THUỐC</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f0f2f5;
}

header {
  background: linear-gradient(135deg,#2c7be5,#1a5edb);
  color: white;
  padding: 18px;
  text-align: center;
}

.container {
  padding: 15px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.item {
  background: white;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.02);
}

.price {
  color: #e74c3c;
  font-weight: bold;
  font-size: 16px;
}

.highlight {
  background: yellow;
}

#progress {
  height: 3px;
  background: #2c7be5;
  width: 0%;
  transition: 0.3s;
}

#status {
  margin-top: 8px;
  color: #666;
}

.empty {
  text-align: center;
  color: #999;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  TRA CỨU GIÁ THUỐC<br>
  <small>Dev by Phúc Nguyễn</small>
</header>

<div id="progress"></div>

<div class="container">
  <input id="search" placeholder="Nhập tên thuốc...">
  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
const API = "data.json";

let allData = [];
let debounceTimer;

const input = document.getElementById("search");
const resultDiv = document.getElementById("result");
const statusDiv = document.getElementById("status");
const progress = document.getElementById("progress");

// ===== NORMALIZE =====
function normalizeText(str) {
  return (str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9 ]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// ===== LOAD CACHE =====
function loadCache() {
  const cache = localStorage.getItem("drugData");
  if (cache) {
    allData = JSON.parse(cache);
    statusDiv.innerHTML = "Offline (" + allData.length + " thuốc)";
  }
}

// ===== LOAD DATA =====
async function loadData() {
  progress.style.width = "30%";
  statusDiv.innerHTML = "Đang tải dữ liệu...";

  try {
    const res = await fetch(API);
    const data = await res.json();

    progress.style.width = "100%";

    allData = data.map(d => {
      let name, price;

      if (Array.isArray(d)) {
        name = d[0];
        price = d[1];
      } else {
        name = d.name || d["Tên hàng"] || "";
        price = d.price || d["Giá bán"] || 0;
      }

      return {
        display: name,
        search: normalizeText(name),
        price: price
      };
    });

    localStorage.setItem("drugData", JSON.stringify(allData));

    statusDiv.innerHTML = "Sẵn sàng (" + allData.length + " thuốc)";
    setTimeout(() => progress.style.width = "0%", 500);

  } catch (err) {
    statusDiv.innerHTML = "Lỗi tải dữ liệu";
    console.error(err);
  }
}

// ===== SEARCH =====
function search() {
  const raw = input.value;
  const q = normalizeText(raw);

  if (q.length < 2) {
    resultDiv.innerHTML = "";
    return;
  }

  const keywords = q.split(" ");
  const result = [];

  for (let i = 0; i < allData.length; i++) {
    const item = allData[i];

    let match = true;
    for (let k of keywords) {
      if (!item.search.includes(k)) {
        match = false;
        break;
      }
    }

    if (match) {
      result.push(item);
      if (result.length >= 30) break;
    }
  }

  if (!result.length) {
    resultDiv.innerHTML = `<div class="empty">Không tìm thấy</div>`;
    return;
  }

  resultDiv.innerHTML = result.map(d => `
    <div class="item">
      <b>${highlight(d.display, raw)}</b><br>
      <span class="price">${Number(d.price).toLocaleString()}đ</span>
    </div>
  `).join("");
}

// ===== HIGHLIGHT =====
function highlight(text, keyword) {
  const index = text.toLowerCase().indexOf(keyword.toLowerCase());
  if (index === -1) return text;

  return text.substring(0, index) +
    "<span class='highlight'>" +
    text.substring(index, index + keyword.length) +
    "</span>" +
    text.substring(index + keyword.length);
}

// ===== DEBOUNCE =====
input.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(search, 200);
});

// INIT
loadCache();
loadData();

// ===== PWA =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
