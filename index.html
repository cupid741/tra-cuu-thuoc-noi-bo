<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRA CỨU HỆ THỐNG</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f0f2f5;
}

header {
  background: linear-gradient(135deg,#2c7be5,#1a5edb);
  color: white;
  padding: 18px;
  text-align: center;
}

/* TAB */
.tabs {
  display: flex;
  background: #fff;
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.tab.active {
  border-bottom: 2px solid #2c7be5;
  font-weight: bold;
}

.container {
  padding: 15px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.item {
  background: white;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.price {
  color: #e74c3c;
  font-weight: bold;
}

#progress {
  height: 3px;
  background: #2c7be5;
  width: 0%;
}

.empty {
  text-align: center;
  color: #999;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  TRA CỨU HỆ THỐNG<br>
  <small>Dev by Phúc Nguyễn</small>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('drug')">💊 Thuốc</div>
  <div class="tab" onclick="switchTab('customer')">👤 Khách hàng</div>
</div>

<div id="progress"></div>

<div class="container">
  <input id="search" placeholder="Nhập tìm kiếm...">
  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
// ================= TAB =================
let currentTab = "drug";

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("search").value = "";
  document.getElementById("result").innerHTML = "";

  if (tab === "drug") {
    statusDiv.innerHTML = "Sẵn sàng (" + drugData.length + " thuốc)";
  } else {
    statusDiv.innerHTML = "Sẵn sàng (" + customerData.length + " khách)";
  }
}

// ================= COMMON =================
function normalize(str) {
  return (str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

const input = document.getElementById("search");
const resultDiv = document.getElementById("result");
const statusDiv = document.getElementById("status");
const progress = document.getElementById("progress");

// ================= DRUG (GIỮ NGUYÊN) =================
const DRUG_API = "data.json";
let drugData = [];

function loadDrugCache() {
  const cache = localStorage.getItem("drugData");
  if (cache) drugData = JSON.parse(cache);
}

async function loadDrug() {
  try {
    const res = await fetch(DRUG_API);
    const data = await res.json();

    drugData = data.map(d => ({
      display: d[0],
      search: normalize(d[0]),
      price: d[1]
    }));

    localStorage.setItem("drugData", JSON.stringify(drugData));
    if (currentTab === "drug")
      statusDiv.innerHTML = "Sẵn sàng (" + drugData.length + " thuốc)";
  } catch {}
}

// ================= CUSTOMER =================
const CUSTOMER_API = "https://script.google.com/macros/s/AKfycbzYp-h74OC4Xx8uCulrylLdtz2rEX4Z9LiyTcnu1lrfxqjUf_X5If0AXgwcf1sqA8Gm/exec";

let customerData = [];

function loadCustomerCache() {
  const cache = localStorage.getItem("customers");
  if (cache) customerData = JSON.parse(cache);
}

async function loadCustomer() {
  try {
    const res = await fetch(CUSTOMER_API);
    const data = await res.json();

    customerData = data.map(d => ({
      name: d[0],
      phone: d[1],
      points: d[2],
      search: normalize(d[0] + " " + d[1])
    }));

    localStorage.setItem("customers", JSON.stringify(customerData));

    if (currentTab === "customer")
      statusDiv.innerHTML = "Sẵn sàng (" + customerData.length + " khách)";
  } catch {}
}

// ================= SEARCH =================
let debounce;

input.addEventListener("input", () => {
  clearTimeout(debounce);
  debounce = setTimeout(doSearch, 150);
});

function doSearch() {
  const q = normalize(input.value);
  if (q.length < 2) {
    resultDiv.innerHTML = "";
    return;
  }

  const keywords = q.split(" ");
  let source = currentTab === "drug" ? drugData : customerData;

  const result = [];

  for (let item of source) {
    let ok = keywords.every(k => item.search.includes(k));
    if (ok) {
      result.push(item);
      if (result.length >= 30) break;
    }
  }

  if (!result.length) {
    resultDiv.innerHTML = `<div class="empty">Không tìm thấy</div>`;
    return;
  }

  if (currentTab === "drug") {
    resultDiv.innerHTML = result.map(d => `
      <div class="item">
        <b>${d.display}</b><br>
        <span class="price">${Number(d.price).toLocaleString()}đ</span>
      </div>
    `).join("");
  } else {
    resultDiv.innerHTML = result.map(d => `
      <div class="item">
        <b>${d.name}</b><br>
        📞 ${d.phone}<br>
        ⭐ ${Number(d.points).toLocaleString()} điểm
      </div>
    `).join("");
  }
}

// ================= INIT =================
loadDrugCache();
loadCustomerCache();

loadDrug();
loadCustomer();

setInterval(loadCustomer, 300000);

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
