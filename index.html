<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>NHÀ THUỐC HIỀN MAI</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  
  <style>
    /* ----- RESET & VARIABLES ----- */
    * {
      box-sizing: border-box;
      margin: 0;
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f4f7fc;
      margin: 0;
      min-height: 100vh;
      color: #1e293b;
      -webkit-font-smoothing: antialiased;
    }
    
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --primary-dark: #1d4ed8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --gray-bg: #f8fafc;
      --card-bg: #ffffff;
      --border-light: #e2e8f0;
      --text-secondary: #64748b;
      --shadow-sm: 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
      --radius-card: 20px;
      --radius-element: 14px;
    }
    
    /* ----- HEADER ----- */
    header {
      background: linear-gradient(145deg, #1e3a8a 0%, #2563eb 100%);
      color: white;
      padding: 20px 18px;
      position: relative;
      box-shadow: var(--shadow-md);
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      margin-bottom: 4px;
    }
    
    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    
    header small {
      font-weight: 400;
      opacity: 0.85;
      font-size: 0.8rem;
      display: block;
    }
    
    .reload-btn {
      position: absolute;
      right: 18px;
      top: 22px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
      user-select: none;
    }
    .reload-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(0.96);
    }
    .spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    /* ----- TABS ----- */
    .tabs {
      display: flex;
      background: var(--card-bg);
      margin: 8px 16px 0;
      padding: 6px;
      border-radius: 60px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      backdrop-filter: blur(10px);
    }
    .tab {
      flex: 1;
      padding: 12px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 40px;
      color: var(--text-secondary);
      transition: all 0.2s;
      background: transparent;
      border: none;
    }
    .tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 6px 12px -6px rgba(37, 99, 235, 0.4);
      font-weight: 600;
    }
    
    /* ----- CONTAINER & INPUT ----- */
    .container {
      padding: 16px 16px 24px;
    }

    /* ---- KHÁCH HÀNG PANEL (chỉ hiện ở tab bán hàng) ---- */
    #sell-customer-panel {
      margin-bottom: 16px;
      display: none; /* mặc định ẩn */
    }
    .customer-panel-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }
    .new-cust-highlight {
      background: #fffbeb !important;
      border-color: #fcd34d !important;
    }
    
    #search {
      width: 100%;
      padding: 16px 18px;
      font-size: 1rem;
      border-radius: 30px;
      border: 1.5px solid var(--border-light);
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
      transition: border 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
      font-weight: 500;
    }
    #search:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }
    #search::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }
    
    /* Status bar */
    #status {
      margin-bottom: 16px;
      font-size: 0.9rem;
      padding: 4px 8px;
      border-radius: 30px;
      display: inline-block;
      background: #eef2ff;
      color: var(--primary-dark);
      font-weight: 500;
    }
    .loading-text {
      animation: pulse 1.5s infinite;
      display: inline-block;
    }
    @keyframes pulse { 0%,100%{ opacity: 1; } 50%{ opacity: 0.5; } }
    
    /* ----- CARDS & ITEMS ----- */
    .item, .card {
      background: var(--card-bg);
      padding: 18px 16px;
      margin-bottom: 12px;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      transition: transform 0.1s;
    }
    
    .price {
      color: var(--danger);
      font-weight: 700;
      font-size: 1.2rem;
      display: inline-block;
      margin-top: 6px;
    }
    
    .empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 36px 20px;
      background: var(--card-bg);
      border-radius: 32px;
      font-weight: 500;
    }
    
    /* ----- BUTTONS ----- */
    button {
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 12px 18px;
      font-weight: 600;
      box-shadow: 0 8px 14px -8px rgba(37, 99, 235, 0.4);
    }
    .btn-add {
      background: var(--success);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 4px 8px -4px rgba(16, 185, 129, 0.3);
    }
    .btn-remove {
      background: #fee2e2;
      color: var(--danger);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-remove:hover {
      background: #fecaca;
    }
    button:disabled {
      opacity: 0.6;
      filter: grayscale(0.3);
      cursor: not-allowed;
    }
    
    /* ----- SELL CART SPECIFIC ----- */
    .sell-item {
      border-bottom: 1px solid #f1f5f9;
      padding: 16px 0;
    }
    .sell-item:last-child { border-bottom: none; }
    
    .sell-total {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary-dark);
      text-align: right;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 2px dashed var(--border-light);
    }
    
    .inline-input-small {
      width: 90px;
      padding: 8px 10px;
      margin: 0 4px;
      text-align: right;
      border-radius: 20px;
      border: 1.5px solid var(--border-light);
    }
    
    .btn-finish {
      width: 100%;
      padding: 18px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.2rem;
      margin-top: 20px;
      box-shadow: 0 12px 20px -8px rgba(16, 185, 129, 0.4);
    }
  </style>
</head>

<body>

<header>
  <div style="font-weight: 700; font-size: 1.8rem; letter-spacing: -0.02em;">📋 NHÀ THUỐC HIỀN MAI</div>
  <small>DEV BY • Phúc Nguyễn</small>
  <div class="reload-btn" onclick="reloadData(event)" title="Đồng bộ & tải lại">🔄</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab(event,'drug')">💊 Thuốc</div>
  <div class="tab" onclick="switchTab(event,'sell')">🛒 Bán hàng</div>
  <div class="tab" onclick="switchTab(event,'customer')">👤 Khách</div>
  <div class="tab" onclick="switchTab(event,'invoice')">🧾 HĐ</div>
</div>

<div class="container">
  <div id="sell-customer-panel">
    <div id="customer-panel-content" class="customer-panel-card">
      </div>
  </div>

  <input id="search" placeholder="Nhập tên thuốc ..." autocomplete="off">
  <div id="status">Đang khởi tạo...</div>
  <div id="result"></div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getDatabase, ref, set } from "firebase/database";

const firebaseConfig = {
  apiKey: "AIzaSyD8tbfOajkbnFPopOvI0hvF0pr0ggQc-og",
  authDomain: "banthuochienmai.firebaseapp.com",
  databaseURL: "https://banthuochienmai-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "banthuochienmai",
  storageBucket: "banthuochienmai.firebasestorage.app",
  messagingSenderId: "597472261106",
  appId: "1:597472261106:web:318085562407162cc8b16b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window.fbDb = db;
window.fbSet = set;
window.fbRef = ref;
</script>

<script>
// ===== CONFIG =====
const DRUG_API = "data.json";
const CUSTOMER_API = "https://script.google.com/macros/s/AKfycbyGfjkhVrwpABJcjHsTLLLc0GcJqpUqiU9idK6APrGK4089rorZmwWqFqbapAE2uz5R/exec";

// ===== STATE =====
let currentTab = "drug";
let drugData = [];
let customerData = [];
let invoiceData = [];
let cart = []; 
let customerInOrder = { phone: "", name: "", isNew: false, saveToSheet: true };
let isDownloading = false;

const input = document.getElementById("search");
const resultDiv = document.getElementById("result");
const statusDiv = document.getElementById("status");
const customerPanel = document.getElementById("sell-customer-panel");
const panelContent = document.getElementById("customer-panel-content");

// ===== HIỂN THỊ / CẬP NHẬT PANEL KHÁCH HÀNG (FIX LAG) =====
function renderCustomerPanel() {
  if (currentTab !== 'sell') return;
  
  const phone = customerInOrder.phone || '';
  
  // Khởi tạo khung sườn nếu chưa có (tránh vẽ lại toàn bộ gây mất focus)
  if (!document.getElementById('cust-phone-input')) {
    panelContent.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
        <span style="font-size:1.5rem;">👤</span>
        <b style="font-size:1.1rem;">Thông tin khách hàng</b>
      </div>
      <input type="tel" id="cust-phone-input" value="${phone}" placeholder="Nhập số điện thoại ..." 
             oninput="window.findCustomerInOrder(this.value)" 
             style="width:100%; padding:14px; border-radius:40px; border:1.5px solid var(--border-light); margin-bottom:8px; font-size:1rem;">
      <div id="customer-info-area" style="min-height: 40px;"></div>
    `;
  }

  const infoArea = document.getElementById('customer-info-area');
  const found = phone ? customerData.find(c => c.phone === phone) : null;
  let innerHtml = "";
  
  if (found) {
    customerInOrder.name = found.name;
    customerInOrder.isNew = false;
    innerHtml = `<div style="background:#e6f7e6; padding:10px 14px; border-radius:30px; color:#0a5e0a;">✅ ${found.name} (thành viên) — ${found.points || 0} điểm</div>`;
  } else if (phone.length >= 9) {
    customerInOrder.isNew = true;
    innerHtml = `
      <div style="color:#b45309; margin-top:8px; font-weight:500;">✨ Khách hàng mới</div>
      <input type="text" id="new-cust-name" placeholder="Nhập tên khách hàng" oninput="customerInOrder.name = this.value" 
             style="width:100%; margin-top:6px; padding:12px; border-radius:40px; border:1.5px solid #fcd34d;">
      <label style="display:flex; align-items:center; margin-top:10px; gap:8px;">
        <input type="checkbox" id="saveToSheetCheck" checked onchange="customerInOrder.saveToSheet = this.checked"> 
        <span>Lưu vào danh sách thành viên</span>
      </label>
    `;
  } else {
    customerInOrder.name = "";
    customerInOrder.isNew = false;
    innerHtml = `<div style="color:#64748b; padding:8px 0;">👋 Khách lẻ (chưa có SĐT)</div>`;
  }
  
  if (infoArea) infoArea.innerHTML = innerHtml;
  
  if (customerInOrder.isNew && phone.length >= 9) {
    panelContent.classList.add('new-cust-highlight');
  } else {
    panelContent.classList.remove('new-cust-highlight');
  }
}

// Gán lại hàm findCustomerInOrder để cập nhật panel + state
window.findCustomerInOrder = function(phone) {
  customerInOrder.phone = phone;
  const found = customerData.find(c => c.phone === phone);
  if (found) {
    customerInOrder.name = found.name;
    customerInOrder.isNew = false;
  } else {
    customerInOrder.isNew = (phone.length >= 9);
    if (!customerInOrder.isNew) customerInOrder.name = "";
  }
  renderCustomerPanel();
  
  // Chỉ render lại giỏ hàng nếu không đang gõ (tránh lag)
  if (currentTab === 'sell' && input.value.trim() === '') {
    renderCart();
  }
};

// ===== TAB SWITCH =====
window.switchTab = function(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (e) e.target.classList.add("active");
  input.value = "";
  resultDiv.innerHTML = "";
  
  if (tab === 'sell') {
    customerPanel.style.display = 'block';
    input.placeholder = "🔍 Tìm thuốc để thêm vào đơn ...";
    renderCustomerPanel();
    renderCart(); 
  } else {
    customerPanel.style.display = 'none';
    if (tab === 'drug') input.placeholder = "Nhập tên thuốc ...";
    else if (tab === 'customer') input.placeholder = "Nhập số điện thoại ...";
    else if (tab === 'invoice') input.placeholder = "Nhập SĐT tra cứu hóa đơn ...";
  }
  updateStatus();
};

function updateStatus(msg) {
  let count = 0, label = "";
  if (currentTab === "drug" || currentTab === "sell") { count = drugData.length; label = "thuốc"; }
  else if (currentTab === "customer") { count = customerData.length; label = "khách"; }
  else { count = invoiceData.length; label = "hóa đơn"; }

  statusDiv.innerHTML = msg ? `<span class="loading-text">${msg}</span> (${count} ${label})` : `✨ Sẵn sàng (${count} ${label})`;
}

// ===== LOAD INVOICE =====
async function loadInvoice() {
  updateStatus("Đang tải hóa đơn...");
  try {
    const files = Array.from({length: 6}, (_, i) => `data${i+1}.json`);
    const responses = await Promise.all(files.map(f => fetch(f)));
    const jsons = await Promise.all(responses.map(r => r.json()));
    invoiceData = jsons.flat();
    updateStatus();
  } catch (e) { updateStatus("Lỗi tải hóa đơn!"); }
}

function normalize(str) {
  return (str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function loadDrugCache() { const c = localStorage.getItem("drugData"); if (c) drugData = JSON.parse(c); }
async function loadDrug() {
  updateStatus("Đang tải thuốc...");
  try {
    const res = await fetch(DRUG_API); const data = await res.json();
    drugData = data.map(d => ({ display: d[0], search: normalize(d[0]), price: d[1] }));
    localStorage.setItem("drugData", JSON.stringify(drugData));
    updateStatus();
  } catch (e) { updateStatus("Lỗi tải thuốc!"); }
}

function loadCustomerCache() { const c = localStorage.getItem("customers"); if (c) customerData = JSON.parse(c); }
async function loadCustomer() {
  if (isDownloading) return;
  isDownloading = true; updateStatus("Đang đồng bộ...");
  try {
    const res = await fetch(CUSTOMER_API); const data = await res.json();
    customerData = data.map(d => ({ name: d[0], phone: String(d[1]), points: Number(d[2]) }));
    localStorage.setItem("customers", JSON.stringify(customerData));
    isDownloading = false; updateStatus(); 
    if (currentTab === 'sell') renderCustomerPanel();
  } catch (e) { isDownloading = false; updateStatus("Lỗi đồng bộ!"); }
}

function parseTime(timeStr) {
  if (!timeStr) return 0;
  const parts = timeStr.split(' '); const datePart = parts[0]; const timePart = parts[1] || '00:00:00';
  const dateSegments = datePart.includes('/') ? datePart.split('/') : datePart.split('-');
  if (dateSegments.length === 3) {
    const day = parseInt(dateSegments[0]), month = parseInt(dateSegments[1])-1, year = parseInt(dateSegments[2]);
    const timeSegments = timePart.split(':'); const hour = parseInt(timeSegments[0]||0), minute = parseInt(timeSegments[1]||0), second = parseInt(timeSegments[2]||0);
    const date = new Date(year, month, day, hour, minute, second);
    return isNaN(date) ? 0 : date.getTime();
  }
  return new Date(timeStr).getTime() || 0;
}

window.updatePoints = async function(phone) {
  const inputEl = document.getElementById(`i-${phone}`); const pointEl = document.getElementById(`p-${phone}`); const btnEl = document.getElementById(`btn-${phone}`);
  if (!inputEl || !pointEl) return;
  let delta = parseInt(inputEl.value.trim(), 10);
  if (isNaN(delta) || delta === 0) { alert("Vui lòng nhập số điểm hợp lệ"); return; }
  const customer = customerData.find(c => c.phone === phone);
  if (!customer) { alert("Không tìm thấy khách"); return; }
  const oldText = pointEl.innerText; const oldPoints = parseInt(oldText.replace(/\D/g, ""));
  const newPoints = Math.max(0, oldPoints + delta);
  pointEl.textContent = newPoints.toLocaleString(); inputEl.value = "";
  if (btnEl) { btnEl.disabled = true; btnEl.innerText = "Đang lưu..."; }
  try {
    const params = new URLSearchParams(); params.append('phone', phone); params.append('points', delta); params.append('name', customer.name);
    await fetch(CUSTOMER_API, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: params.toString() });
    customer.points = newPoints; localStorage.setItem("customers", JSON.stringify(customerData));
    if (btnEl) { btnEl.disabled = false; btnEl.innerText = "➕ Cập nhật điểm"; }
    alert(`✅ Đã cập nhật điểm cho ${customer.name}`);
  } catch (error) { alert("❌ Lỗi kết nối!"); pointEl.textContent = oldText; if(btnEl){ btnEl.disabled = false; btnEl.innerText = "➕ Cập nhật điểm"; } }
};

// ===== BÁN HÀNG =====
window.addToCart = function(name, price) {
  const existing = cart.find(i => i.name === name);
  if (existing) existing.qty += 1; else cart.push({ name, price: Number(price), qty: 1 });
  input.value = "";
  renderCart();
};
window.removeFromCart = function(index) { cart.splice(index, 1); renderCart(); };
window.updateQty = function(index, val) { cart[index].qty = Math.max(1, Number(val)); renderCart(); };
window.updatePrice = function(index, val) { cart[index].price = Math.max(0, Number(val)); renderCart(); };

window.finishOrder = async function() {
  if (cart.length === 0) return; 
  const btn = document.getElementById("btn-finish"); 
  btn.disabled = true; btn.innerText = "⌛ Đang xử lý...";
  
  if (customerInOrder.isNew && customerInOrder.saveToSheet) {
    const nameInput = document.getElementById('new-cust-name');
    if (nameInput) customerInOrder.name = nameInput.value.trim() || "Khách mới";
  }
  
  try {
    if (customerInOrder.isNew && customerInOrder.saveToSheet && customerInOrder.phone) {
      const p = new URLSearchParams(); 
      p.append('phone', customerInOrder.phone); 
      p.append('name', customerInOrder.name || "Khách mới"); 
      p.append('points', 0);
      await fetch(CUSTOMER_API, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: p.toString() });
    }
    const orderId = Date.now();
    await window.fbSet(window.fbRef(window.fbDb, 'orders/' + orderId), {
      time: new Date().toLocaleString('vi-VN'), 
      phone: customerInOrder.phone || "Khách lẻ",
      name: customerInOrder.name || "Khách lẻ", 
      items: cart, 
      total: cart.reduce((s,i)=> s+(i.price*i.qty),0)
    });
    alert("✅ Hoàn tất đơn hàng!");
    cart = []; 
    customerInOrder = { phone: "", name: "", isNew: false, saveToSheet: true }; 
    renderCustomerPanel();
    renderCart(); 
    loadCustomer();
  } catch(e) { 
    alert("❌ Lỗi: "+e.message); 
    btn.disabled = false; 
    btn.innerText = "HOÀN TẤT ĐƠN HÀNG"; 
  }
};

function renderCart() {
  if (currentTab !== 'sell') return;

  // FIX LAG: Nếu đang gõ ở ô SĐT, không render lại phần giỏ hàng bên dưới
  const phoneInput = document.getElementById('cust-phone-input');
  if (phoneInput && document.activeElement === phoneInput) return;

  if (input.value.trim() !== '') return;
  
  let html = `<div class="card" style="margin-top:8px;">`;
  if (cart.length === 0) {
    html += `<div class="empty">🛒 Giỏ hàng trống<br><span style="font-size:0.9rem;">Dùng ô tìm kiếm phía trên để thêm thuốc</span></div>`;
  } else {
    let total = 0;
    cart.forEach((item, idx) => {
      const sub = item.price * item.qty; total += sub;
      html += `<div class="sell-item">
        <div style="display:flex; justify-content:space-between">
          <b>${item.name}</b>
          <button class="btn-remove" onclick="removeFromCart(${idx})">✕</button>
        </div>
        <div style="margin-top:10px">
          Đơn giá <input type="number" value="${item.price}" onchange="updatePrice(${idx}, this.value)" class="inline-input-small"> x 
          SL <input type="number" value="${item.qty}" onchange="updateQty(${idx}, this.value)" style="width:70px"> 
          <span style="float:right; font-weight:600">${sub.toLocaleString()}đ</span>
        </div>
      </div>`;
    });
    html += `<div class="sell-total">TỔNG: ${total.toLocaleString()}đ</div>
      <button id="btn-finish" class="btn-finish" onclick="finishOrder()">✅ HOÀN TẤT ĐƠN HÀNG</button>`;
  }
  html += `</div>`;
  resultDiv.innerHTML = html;
}

// ===== SEARCH =====
let debounce;
input.addEventListener("input", () => { 
  clearTimeout(debounce); 
  debounce = setTimeout(doSearch, 300); 
  if (currentTab === 'sell' && input.value.trim() === '') {
    const phoneInput = document.getElementById('cust-phone-input');
    if (!phoneInput || document.activeElement !== phoneInput) renderCart();
  }
});

function doSearch() {
  const q = input.value.trim();
  if (currentTab === 'sell') {
    if (!q) { renderCart(); return; }
    const searchQ = normalize(q);
    if (searchQ.length < 2) return;
    const result = drugData.filter(d => d.search.includes(searchQ)).slice(0,30);
    resultDiv.innerHTML = result.length ? result.map(d => `
      <div class="item"><b>${d.display}</b> <span class="price">${Number(d.price).toLocaleString()}đ</span>
        <button class="btn-add" style="float:right" onclick="addToCart('${d.display}','${d.price}')">➕ Thêm</button>
      </div>`).join("") : `<div class="empty">Không tìm thấy thuốc</div>`;
    return;
  }
  
  if (currentTab === "drug") {
    if (!q) { resultDiv.innerHTML = ""; return; }
    const searchQ = normalize(q); if(searchQ.length<2) return;
    const result = drugData.filter(d => d.search.includes(searchQ)).slice(0,30);
    resultDiv.innerHTML = result.length ? result.map(d => `
      <div class="item"><b>${d.display}</b><br><span class="price">${Number(d.price).toLocaleString()}đ</span></div>
    `).join("") : `<div class="empty">Không tìm thấy</div>`;
  }
  else if (currentTab === "customer") {
    if (q.length < 4) { resultDiv.innerHTML = `<div class="empty">Nhập ít nhất 4 số</div>`; return; }
    let exact=[], near=[]; 
    customerData.forEach(d => { if(d.phone===q) exact.push(d); else if(d.phone.includes(q)) near.push(d); });
    const result = [...exact, ...near].slice(0,30);
    resultDiv.innerHTML = result.length ? result.map(d => `
      <div class="item"><b>${d.name}</b><br>📞 ${d.phone}<br>⭐ <b id="p-${d.phone}">${Number(d.points).toLocaleString()}</b> điểm
        <input type="number" id="i-${d.phone}" placeholder="Nhập điểm (+/-)" class="point-input">
        <button id="btn-${d.phone}" onclick="updatePoints('${d.phone}')" style="background:var(--primary); color:white; border:none; width:100%; padding:12px; border-radius:40px;">➕ Cập nhật điểm</button>
      </div>`).join("") : `<div class="empty">Không tìm thấy</div>`;
  }
  else if (currentTab === "invoice") {
    if (q.length < 4) { resultDiv.innerHTML = `<div class="empty">Nhập thêm số</div>`; return; }
    const filtered = invoiceData.filter(d => String(d["Điện thoại"]).includes(q));
    if (!filtered.length) { resultDiv.innerHTML = `<div class="empty">Không có hóa đơn</div>`; return; }
    const groups = {}; filtered.forEach(d => { const key = `${d["Thời gian"]}|${d["Tên khách hàng"]}|${d["Điện thoại"]}`;
      if(!groups[key]) groups[key] = { time:d["Thời gian"], name:d["Tên khách hàng"], phone:d["Điện thoại"], items:[], total:d["Tổng tiền hàng"]||0 };
      groups[key].items.push({ product:d["Tên hàng"], unit:d["ĐVT"], qty:d["Số lượng"], price:d["Đơn giá"], amount:d["Thành tiền"] });
    });
    const arr = Object.values(groups).sort((a,b)=> parseTime(b.time)-parseTime(a.time)).slice(0,15);
    resultDiv.innerHTML = arr.map(g => `<div class="invoice-group"><b>🕒 ${g.time}</b><br>👤 ${g.name} 📞 ${g.phone}<br><br>
      ${g.items.map(i=>`• ${i.product} (${i.unit}) SL:${i.qty} | ${Number(i.price).toLocaleString()}đ → ${Number(i.amount).toLocaleString()}đ`).join('<br>')}
      <hr><b>💰 Tổng: ${Number(g.total).toLocaleString()}đ</b></div>`).join("");
  }
}

window.reloadData = function(event) {
  const icon = event.currentTarget; icon.classList.add("spin");
  if (!confirm("Xóa cache & tải lại dữ liệu?")) { icon.classList.remove("spin"); return; }
  localStorage.removeItem("drugData"); localStorage.removeItem("customers");
  drugData = []; customerData = []; invoiceData = []; resultDiv.innerHTML = "";
  updateStatus("Đang reload...");
  Promise.all([loadDrug(), loadCustomer(), loadInvoice()]).finally(() => { 
    icon.classList.remove("spin"); 
    updateStatus(); 
    if (currentTab === 'sell') renderCustomerPanel();
  });
};

// INIT
loadDrugCache(); loadCustomerCache(); updateStatus(); 
loadDrug(); loadCustomer(); loadInvoice();
setInterval(loadCustomer, 300000);
</script>
