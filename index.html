<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRA CỨU HỆ THỐNG</title>

<style>
body { font-family: Arial; margin: 0; background: #f0f2f5; }

header {
  background: linear-gradient(135deg,#2c7be5,#1a5edb);
  color: white;
  padding: 18px;
  text-align: center;
}

.tabs { display: flex; background: #fff; }
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  cursor: pointer;
}
.tab.active {
  border-bottom: 2px solid #2c7be5;
  font-weight: bold;
}

.container { padding: 15px; }

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
}

.item {
  background: white;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
}

.price { color: red; font-weight: bold; }

.empty { text-align: center; color: #999; }
</style>
</head>

<body>

<header>
  TRA CỨU HỆ THỐNG<br>
  <small>Dev by Phúc Nguyễn</small>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab(event,'drug')">💊 Thuốc</div>
  <div class="tab" onclick="switchTab(event,'customer')">👤 Khách hàng</div>
</div>

<div class="container">
  <input id="search" placeholder="Nhập tìm kiếm...">
  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
// ===== CONFIG =====
const DRUG_API = "data.json";
const CUSTOMER_API = "https://script.google.com/macros/s/AKfycbzYp-h74OC4Xx8uCulrylLdtz2rEX4Z9LiyTcnu1lrfxqjUf_X5If0AXgwcf1sqA8Gm/exec";

// ===== STATE =====
let currentTab = "drug";
let drugData = [];
let customerData = [];

// ===== ELEMENT =====
const input = document.getElementById("search");
const resultDiv = document.getElementById("result");
const statusDiv = document.getElementById("status");

// ===== TAB =====
function switchTab(e, tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  e.target.classList.add("active");

  input.value = "";
  resultDiv.innerHTML = "";

  updateStatus();
}

// ===== STATUS =====
function updateStatus() {
  if (currentTab === "drug") {
    statusDiv.innerHTML = "Sẵn sàng (" + drugData.length + " thuốc)";
  } else {
    statusDiv.innerHTML = "Sẵn sàng (" + customerData.length + " khách)";
  }
}

// ===== NORMALIZE =====
function normalize(str) {
  return (str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// ===== LOAD DRUG =====
function loadDrugCache() {
  const c = localStorage.getItem("drugData");
  if (c) drugData = JSON.parse(c);
}

async function loadDrug() {
  const res = await fetch(DRUG_API);
  const data = await res.json();

  drugData = data.map(d => ({
    display: d[0],
    search: normalize(d[0]),
    price: d[1]
  }));

  localStorage.setItem("drugData", JSON.stringify(drugData));
  updateStatus();
}

// ===== LOAD CUSTOMER =====
function loadCustomerCache() {
  const c = localStorage.getItem("customers");
  if (c) customerData = JSON.parse(c);
}

async function loadCustomer() {
  const res = await fetch(CUSTOMER_API);
  const data = await res.json();

  customerData = data.map(d => ({
    name: d[0],
    phone: d[1],
    points: d[2]
  }));

  localStorage.setItem("customers", JSON.stringify(customerData));
  updateStatus();
}

// ===== SEARCH =====
let debounce;
input.addEventListener("input", () => {
  clearTimeout(debounce);
  debounce = setTimeout(doSearch, 150);
});

function doSearch() {
  if (currentTab === "drug") {
    const q = normalize(input.value);
    if (q.length < 2) return resultDiv.innerHTML = "";

    const result = drugData.filter(d => d.search.includes(q)).slice(0, 30);

    resultDiv.innerHTML = result.length ? result.map(d => `
      <div class="item">
        <b>${d.display}</b><br>
        <span class="price">${Number(d.price).toLocaleString()}đ</span>
      </div>
    `).join("") : `<div class="empty">Không tìm thấy</div>`;

  } else {
    const q = input.value.trim();
    if (q.length < 3) return resultDiv.innerHTML = "";

    let exact = [];
    let near = [];

    for (let d of customerData) {
      if (d.phone === q) exact.push(d);
      else if (d.phone.includes(q)) near.push(d);
    }

    const result = [...exact, ...near].slice(0, 20);

    resultDiv.innerHTML = result.length ? result.map(d => `
      <div class="item">
        <b>${d.name}</b><br>
        📞 ${d.phone}<br>
        ⭐ <b id="p-${d.phone}">${Number(d.points).toLocaleString()}</b> điểm
        <br><br>

        <input type="number" id="i-${d.phone}" placeholder="Nhập điểm +" style="width:100%;padding:8px;margin-bottom:5px">

        <button onclick="updatePoints('${d.phone}')"
        style="width:100%;padding:10px;background:#2c7be5;color:white;border:none;border-radius:8px">
        ➕ Cập nhật
        </button>
      </div>
    `).join("") : `<div class="empty">Không tìm thấy</div>`;
  }
}

// ===== UPDATE POINT =====
async function updatePoints(phone) {
  const val = parseInt(document.getElementById("i-"+phone).value);
  if (!val) return alert("Nhập điểm");

  await fetch(CUSTOMER_API, {
    method: "POST",
    body: JSON.stringify({ phone, points: val })
  });

  let el = document.getElementById("p-"+phone);
  let cur = parseInt(el.innerText.replace(/\D/g,""));
  el.innerText = (cur + val).toLocaleString();

  document.getElementById("i-"+phone).value = "";
  alert("OK");
}

// ===== INIT =====
loadDrugCache();
loadCustomerCache();
updateStatus();

loadDrug();
loadCustomer();
setInterval(loadCustomer, 300000);
</script>

</body>
</html>
